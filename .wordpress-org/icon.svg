<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#000000"/>
  
  <!-- Neural network connections -->
  <g stroke="#ffffff" stroke-width="3" stroke-opacity="0.4" fill="none">
    <!-- Outer connections -->
    <line x1="128" y1="48" x2="68" y2="88"/>
    <line x1="128" y1="48" x2="188" y2="88"/>
    <line x1="68" y1="88" x2="48" y2="148"/>
    <line x1="188" y1="88" x2="208" y2="148"/>
    <line x1="48" y1="148" x2="78" y2="198"/>
    <line x1="208" y1="148" x2="178" y2="198"/>
    <line x1="78" y1="198" x2="128" y2="208"/>
    <line x1="178" y1="198" x2="128" y2="208"/>
    
    <!-- Inner connections to center -->
    <line x1="128" y1="128" x2="128" y2="48"/>
    <line x1="128" y1="128" x2="68" y2="88"/>
    <line x1="128" y1="128" x2="188" y2="88"/>
    <line x1="128" y1="128" x2="48" y2="148"/>
    <line x1="128" y1="128" x2="208" y2="148"/>
    <line x1="128" y1="128" x2="78" y2="198"/>
    <line x1="128" y1="128" x2="178" y2="198"/>
    <line x1="128" y1="128" x2="128" y2="208"/>
    
    <!-- Cross connections for depth -->
    <line x1="68" y1="88" x2="188" y2="88"/>
    <line x1="48" y1="148" x2="208" y2="148"/>
    <line x1="78" y1="198" x2="178" y2="198"/>
  </g>
  
  <!-- Neural nodes - outer ring -->
  <g fill="#fbbf24">
    <circle cx="128" cy="48" r="14"/>
    <circle cx="68" cy="88" r="12"/>
    <circle cx="188" cy="88" r="12"/>
    <circle cx="48" cy="148" r="12"/>
    <circle cx="208" cy="148" r="12"/>
    <circle cx="78" cy="198" r="12"/>
    <circle cx="178" cy="198" r="12"/>
    <circle cx="128" cy="208" r="14"/>
  </g>
  
  <!-- Central AI core -->
  <circle cx="128" cy="128" r="32" fill="#ffffff"/>
  
  <!-- AI text -->
  <text x="128" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#000000">AI</text>
  
  <!-- Subtle glow rings -->
  <circle cx="128" cy="128" r="44" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="128" cy="128" r="56" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>
</svg>
